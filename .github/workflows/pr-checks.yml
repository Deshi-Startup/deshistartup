name: PR checks

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bangla style lint (hard findings fail)
        run: npm run lint:bangla -- --strict

      - name: Build static site
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
