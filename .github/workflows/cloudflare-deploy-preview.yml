name: Deploy to Cloudflare Workers (Preview)

on:
  pull_request:
    branches: [vinext]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: cloudflare-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure custom domain for preview
        run: |
          node -e "
          const fs = require('fs');
          let content = fs.readFileSync('wrangler.jsonc', 'utf8');
          const routes = '\"routes\": [ { \"pattern\": \"pr-${{ github.event.pull_request.number }}.startup.anwar.bd\", \"custom_domain\": true } ],';
          content = content.replace('{', '{\n  ' + routes);
          fs.writeFileSync('wrangler.jsonc', content);
          "

      - name: Build project
        run: pnpm run build

      - name: Deploy Preview to Cloudflare Workers
        id: deploy
        run: |
          pnpm exec vinext-cloudflare deploy --config dist/server/wrangler.json --name deshistartup-pr-${{ github.event.pull_request.number }} > deploy_output.txt 2>&1 || (cat deploy_output.txt && exit 1)
          cat deploy_output.txt
          echo "DEPLOY_URL=https://pr-${{ github.event.pull_request.number }}.startup.anwar.bd" >> $GITHUB_ENV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment PR with Preview Link
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const deployUrl = process.env.DEPLOY_URL;
            const commentBody = `⚡️ **Cloudflare Worker Preview URL:** [${deployUrl}](${deployUrl})`;

            // Get existing comments to avoid spamming
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('Cloudflare Worker Preview URL')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }
