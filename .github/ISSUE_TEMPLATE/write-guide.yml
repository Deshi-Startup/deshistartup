name: "✍️ একটি গাইড লিখতে চাই · I want to write a guide"
description: "একটি 'লেখা বাকি' বিষয় বেছে নিন, যাতে দুজন একই বিষয়ে কাজ না করেন। · Pick an unwritten topic so two people don't duplicate work."
title: "গাইড: "
labels: ["নতুন গাইড", "claimed"]
body:
  - type: markdown
    attributes:
      value: |
        দারুণ! শুরু করার আগে [অবদান রাখার নিয়ম](https://github.com/Deshi-Startup/deshistartup/blob/main/CONTRIBUTING.md)
        আর [ভাষার মান](https://github.com/Deshi-Startup/deshistartup/blob/main/STYLE.md) দেখে নিন।
        [লেখা বাকি বিষয়গুলো দেখুন](https://github.com/Deshi-Startup/deshistartup/blob/main/plan/content-backlog.csv)।
  - type: input
    id: topic
    attributes:
      label: "কোন বিষয়? · Which topic?"
      description: "স্টাব পাতার লিংক বা ব্যাকলগের বিষয়ের নাম · Link to the stub page, or the topic name from the backlog"
      placeholder: "https://deshistartup.com/registration/..."
    validations:
      required: true
  - type: textarea
    id: experience
    attributes:
      label: "বিষয়টা আপনি কীভাবে জানেন? · How do you know this topic?"
      description: "নিজে করেছেন? পেশাগতভাবে করেন? রিসার্চ করে লিখবেন? এক-দুই লাইনই যথেষ্ট। · Did you do it yourself? Do it professionally? Planning to research it? A line or two is enough."
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: "কোন সূত্র ব্যবহার করবেন? (জানলে) · Which sources will you use? (if known)"
      description: "সরকারি পোর্টাল আগে। ভরসার সূত্রের তালিকা `plan/sources.csv`-এ আছে। · Official portals first. `plan/sources.csv` has the tiered registry."
    validations:
      required: false
  - type: checkboxes
    id: rules
    attributes:
      label: "লেখার মূল নিয়ম · Ground rules"
      options:
        - label: "বাংলায় ভেবে বাংলায় লিখব – ইংরেজি থেকে অনুবাদ নয় (STYLE.md) · I'll think and write in Bangla, not translate from English"
          required: true
        - label: "আইন/ফি/নিয়মের প্রতিটি দাবিতে সূত্র দেব, অনুমান লিখব না · Every legal or fee claim will have a source, with no guessing"
          required: true
