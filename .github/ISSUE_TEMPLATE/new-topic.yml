name: "💡 নতুন বিষয়ের অনুরোধ · Request a new topic"
description: "সাইটে নেই এমন কোনো প্রশ্ন বা বিষয় যোগ করার প্রস্তাব দিন। · Suggest a question or topic the site doesn't cover yet."
title: "নতুন বিষয়: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        আগে [ব্যাকলগে](https://github.com/Deshi-Startup/deshistartup/blob/main/plan/content-backlog.csv) একবার খুঁজে দেখুন –
        ৩৯০+ বিষয় ইতিমধ্যে পরিকল্পনায় আছে। · Please check the backlog first – 390+ topics are already planned.
  - type: input
    id: topic
    attributes:
      label: "বিষয়টা কী? · What's the topic?"
      placeholder: "যেমন: বিদেশি ক্লায়েন্ট থেকে ডলার আনার নিয়ম"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: "কেন দরকার? কে খুঁজবে এটা? · Why is it needed? Who would look for it?"
      description: "বাস্তব পরিস্থিতিটা বলুন – কোন ফাউন্ডার, কোন মুহূর্তে এই প্রশ্নে আটকে যান? · Describe the real situation: which founder gets stuck on this, and when?"
    validations:
      required: true
