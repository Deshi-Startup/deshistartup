name: "🔴 ভুল বা পুরোনো তথ্য জানান · Report wrong or outdated info"
description: "পাতার ভুল, পুরোনো ফি, নষ্ট লিংক বা গোলমেলে ব্যাখ্যা ২ মিনিটে জানান। · Report an error, stale fee, broken link, or unclear explanation in two minutes."
title: "ভুল: "
labels: ["ভুল তথ্য"]
body:
  - type: markdown
    attributes:
      value: |
        ধন্যবাদ! ভুল ধরিয়ে দিলে সবার কাজে লাগে।
        গুছিয়ে লেখার দরকার নেই। যা জানেন, সেটুকুই লিখুন।
        *Thank you! Reporting mistakes is one of the most valuable contributions. Write in Bangla or English, whichever is easier.*
  - type: input
    id: page
    attributes:
      label: "কোন পাতায়? · Which page?"
      description: "পাতার লিংক দিন · Paste the page URL"
      placeholder: "https://deshistartup.com/..."
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: "কী ভুল? · What's wrong?"
      description: "কোন তথ্য, ফি, লিংক বা বাক্য ভুল বা পুরোনো? · Which fact, fee, link, or sentence is wrong or outdated?"
    validations:
      required: true
  - type: textarea
    id: correct
    attributes:
      label: "সঠিক তথ্যটা জানা থাকলে লিখুন, সূত্রসহ · Correct info + source (if known)"
      description: "সরকারি পোর্টাল বা ভরসার সূত্রের লিংক থাকলে দিন। না থাকলেও সমস্যা নেই। · An official or credible source link helps, but it's fine if you don't have one."
    validations:
      required: false
